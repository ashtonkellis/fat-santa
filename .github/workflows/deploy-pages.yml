name: Deploy to GitHub Pages

# Publishes the repo (index.html card browser, card-generator.html, data/,
# assets/) as a static GitHub Pages site.
#
# One-time setup: in the repo, go to Settings -> Pages -> "Build and
# deployment" -> Source: "GitHub Actions". After that this workflow deploys
# on every push to the default branch, or on manual dispatch.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repository as-is (it is already static).
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
