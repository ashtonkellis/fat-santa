name: Deploy to GitHub Pages

# Publishes the repo (index.html card browser, card-generator.html, data/,
# assets/) as a static GitHub Pages site.
#
# No manual setup needed: the "Configure Pages" step below runs with
# enablement: true, so the first successful run on main enables GitHub Pages
# (build type: GitHub Actions) automatically. After that this workflow
# deploys on every push to the default branch, or on manual dispatch.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable GitHub Pages automatically on first run (no Settings toggle).
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repository as-is (it is already static).
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
